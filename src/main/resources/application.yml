server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  servlet:
    multipart:
      max-file-size: 2048GB
      max-request-size: 2048GB
  datasource:
    url: ${NETDISK_DB_URL:jdbc:mysql://localhost:3306/nddb?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true}
    username: ${NETDISK_DB_USERNAME:root}
    password: ${NETDISK_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 2
      connection-timeout: 30000
      validation-timeout: 5000
  flyway:
    baseline-on-migrate: false
    locations: classpath:db/migration

sa-token:
  token-name: NETDISK_TOKEN
  timeout: ${NETDISK_SESSION_TIMEOUT_SECONDS:2592000}
  active-timeout: ${NETDISK_SESSION_ACTIVE_TIMEOUT_SECONDS:1800}
  is-concurrent: true
  is-share: false
  is-read-body: false
  is-read-header: true
  is-read-cookie: true
  is-lasting-cookie: true
  auto-renew: true
  token-style: uuid
  is-log: false
  cookie:
    http-only: true
    same-site: ${NETDISK_SESSION_COOKIE_SAME_SITE:Lax}
    secure: ${NETDISK_SESSION_COOKIE_SECURE:false}

netdisk:
  cors:
    allowed-origins: ${NETDISK_CORS_ALLOWED_ORIGINS:}
    allowed-origin-patterns: ${NETDISK_CORS_ALLOWED_ORIGIN_PATTERNS:}
  storage:
    upload-path: ${NETDISK_UPLOAD_PATH:./data/netdisk/upload}
    temp-dir-name: ${NETDISK_UPLOAD_TEMP_DIR:.tmp}
    upload-session-ttl-hours: ${NETDISK_UPLOAD_SESSION_TTL_HOURS:24}
